# Theme metadata
name = "Nova"

# A bold, scientific blue/teal theme with a confident dark navbar
# in both day and night mode for a consistent, professional brand.

[light]
  # Primary
  primary = "#0369a1"

  # Menu
  menu_primary = "#0b1c33"
  menu_text = "rgba(255, 255, 255, 0.75)"
  menu_text_active = "#38bdf8"
  menu_title = "#ffffff"

  # Home sections
  home_section_odd = "#ffffff"
  home_section_even = "#f3f8fb"

[dark]
  # Primary
  primary = "#38bdf8"

  link = "#38bdf8"
  link_hover = "#7dd3fc"

  # Menu
  menu_primary = "#0b1220"
  menu_text = "rgba(255, 255, 255, 0.65)"
  menu_text_active = "#38bdf8"
  menu_title = "#ffffff"

  # Home sections
  home_section_odd = "#0f172a"
  home_section_even = "#0b1324"
